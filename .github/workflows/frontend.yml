name: Frontend CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'src/Frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/Frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/Frontend/MeetlineUI

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: src/Frontend/MeetlineUI/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
