name: meetline

services:
  postgres:
    image: postgres:18

    ports:
      - "5432:5432"

    environment:
      - POSTGRES_DB=meetline
      - POSTGRES_HOST_AUTH_METHOD=trust

    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8.6-alpine
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
  redis_data:
